services:
  - type: web
    name: agency-mapping-tool
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
